<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Myths · İletişim Sayfası</title>

    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700,200" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
  </head>

  <body id="top">
    <div class="section" id="contact">
      <div class="cc-contact-information">
        <div class="container">
          <div class="cc-contact">
            <div class="row">
              <div class="col-md-9">
                <div class="card mb-0">
                  
                  <div class="h4 text-center title">Bize Ulaşın!</div>

                  <div class="row">
                    
                    <!-- FORM -->
                    <div class="col-md-6">
                      <div class="card-body">
                        <form action="https://api.web3forms.com/submit" method="POST">
                          <input type="hidden" name="access_key" value="fbedaba2-b559-44ce-a216-0e29451053ef">
                          
                          <div class="p pb-3">
                            <strong class="s-text">Bizimle iletişim kurun!</strong>
                          </div>

                          <div class="row mb-3">
                            <div class="col">
                              <div class="input-group">
                                <span class="input-group-addon">
                                  <i class="fa fa-user-circle"></i>
                                </span>
                                <input 
                                  class="form-control"
                                  type="text"
                                  name="name"
                                  placeholder="Ad Soyad"
                                  required
                                />
                              </div>
                            </div>
                          </div>

                          <div class="row mb-3">
                            <div class="col">
                              <div class="input-group">
                                <span class="input-group-addon">
                                  <i class="fa fa-file-text"></i>
                                </span>
                                <input 
                                  class="form-control"
                                  type="text"
                                  name="subject"
                                  placeholder="Konu"
                                  required
                                />
                              </div>
                            </div>
                          </div>

                          <div class="row mb-3">
                            <div class="col">
                              <div class="input-group">
                                <span class="input-group-addon">
                                  <i class="fa fa-envelope"></i>
                                </span>
                                <input 
                                  class="form-control"
                                  type="email"
                                  name="_replyto"
                                  placeholder="E-Posta"
                                  required
                                />
                              </div>
                            </div>
                          </div>

                          <div class="row mb-3">
                            <div class="col">
                              <div class="form-group">
                                <textarea 
                                  class="form-control"
                                  name="message"
                                  placeholder="Mesaj"
                                  required
                                ></textarea>
                              </div>
                            </div>
                          </div>

                          <div class="row">
                            <div class="col">
                              <button class="btn btn-primary" type="submit">
                                Gönder!
                              </button>
                            </div>
                          </div>

                        </form>
                      </div>
                    </div>

                    <!-- BİLGİ ALANI -->
                    <div class="col-md-6">
                      <div class="card-body">
                        <p class="mb-0">
                          <strong>· Lütfen bilgileriniz kontrol edin.</strong>
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div> 
    </div>
  </body>
</html>
